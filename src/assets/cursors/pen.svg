<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
  <!-- A dip-pen for text fields. hotspot at writing tip: 3,27 -->
  <g stroke="#1f1206" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round">
    <!-- ink nib -->
    <path d="M3 27 L7 23 L9 25 Z" fill="#d9d2c4"/>
    <path d="M5 25 L7.5 22.5" stroke="#2a1a0e" stroke-width="0.8"/>
    <!-- barrel -->
    <path d="M7 23 L21 9 L25 13 L11 27 Z" fill="#3a2412"/>
    <path d="M9 25 L23 11" stroke="#5a3a1e" stroke-width="0.8"/>
    <!-- brass band + cap -->
    <path d="M20 10 L24 14" stroke="#e6c24f" stroke-width="1.6"/>
    <path d="M22 8 L26 12 L24 14 L20 10 Z" fill="#7a1414"/>
  </g>
</svg>

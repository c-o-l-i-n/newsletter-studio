<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <!-- Pebbled leather grain via lit, stitched turbulence (seamless tile). -->
    <filter id="cell" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.075" numOctaves="4" seed="19" stitchTiles="stitch" result="n"/>
      <feDiffuseLighting in="n" lighting-color="#7a3d2e" surfaceScale="1.3" result="l">
        <feDistantLight azimuth="235" elevation="55"/>
      </feDiffuseLighting>
      <feColorMatrix in="l" type="matrix"
        values="0.5 0 0 0 0  0 0.45 0 0 0  0 0 0.4 0 0  0 0 0 0.4 0"/>
    </filter>
  </defs>
  <rect width="240" height="240" fill="#4a241c"/>
  <rect width="240" height="240" filter="url(#cell)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a2d22"/>
      <stop offset="1" stop-color="#43201a"/>
    </linearGradient>
    <filter id="cell">
      <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="4" seed="19" result="n"/>
      <feDiffuseLighting in="n" lighting-color="#7a3d2e" surfaceScale="1.4" result="l">
        <feDistantLight azimuth="235" elevation="55"/>

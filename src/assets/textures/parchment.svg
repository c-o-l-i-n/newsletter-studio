<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="p" cx="0.5" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#f5e8c8"/>
      <stop offset="0.7" stop-color="#ecdab2"/>
      <stop offset="1" stop-color="#dcc592"/>
    </radialGradient>
    <filter id="fib">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.06 0"/>
    </filter>
    <filter id="blotch">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="3" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.45  0 0 0 0 0.32  0 0 0 0 0.14  0 0 0 0.10 0"/>
    </filter>
  </defs>
  <rect width="300" height="300" fill="url(#p)"/>
  <rect width="300" height="300" filter="url(#blotch)"/>
  <rect width="300" height="300" filter="url(#fib)"/>
</svg>

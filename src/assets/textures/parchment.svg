<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <!-- Paper fibre. -->
    <filter id="fib" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="11" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.05 0"/>
    </filter>
    <!-- Soft aging blotches. -->
    <filter id="blotch" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.45  0 0 0 0 0.32  0 0 0 0 0.14  0 0 0 0.09 0"/>
    </filter>
  </defs>
  <rect width="300" height="300" fill="#ecdab2"/>
  <rect width="300" height="300" filter="url(#blotch)"/>
  <rect width="300" height="300" filter="url(#fib)"/>
</svg>

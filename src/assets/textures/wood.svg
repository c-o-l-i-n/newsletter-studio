<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b2415"/>
      <stop offset="0.5" stop-color="#2c1a0e"/>
      <stop offset="1" stop-color="#1f1209"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.16" numOctaves="4" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.55 0"/>
    </filter>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.09" numOctaves="3" seed="42" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.32  0 0 0 0 0.20  0 0 0 0 0.10  0 0 0 0.30 0"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#base)"/>
  <rect width="400" height="400" filter="url(#grain2)"/>
  <rect width="400" height="400" filter="url(#grain)"/>
</svg>

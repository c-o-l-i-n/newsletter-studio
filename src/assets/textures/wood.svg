<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Fine, horizontally-stretched grain. stitchTiles makes it seamless. -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.15" numOctaves="5" seed="7" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.19  0 0 0 0 0.10  0 0 0 0 0.045  0 0 0 0.55 0"/>
    </filter>
    <!-- Broad colour variation between planks. -->
    <filter id="grain2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.05" numOctaves="3" seed="42" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.34  0 0 0 0 0.21  0 0 0 0 0.10  0 0 0 0.28 0"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#2a190d"/>
  <rect width="400" height="400" filter="url(#grain2)"/>
  <rect width="400" height="400" filter="url(#grain)"/>
</svg>

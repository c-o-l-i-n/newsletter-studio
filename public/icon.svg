<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43291a"/>
      <stop offset="1" stop-color="#241509"/>
    </linearGradient>
    <radialGradient id="parch" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#f6ead0"/>
      <stop offset="1" stop-color="#d8c08c"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d27a"/>
      <stop offset="0.5" stop-color="#b8893a"/>
      <stop offset="1" stop-color="#7a5520"/>
    </linearGradient>
  </defs>

  <!-- wood plaque -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#wood)"/>
  <rect x="22" y="22" width="468" height="468" rx="74" fill="none" stroke="url(#brass)" stroke-width="16"/>

  <!-- parchment medallion -->
  <circle cx="256" cy="248" r="150" fill="url(#parch)" stroke="#8a5a22" stroke-width="6"/>

  <!-- serif N -->
  <text x="256" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="220" fill="#2a1a0e">N</text>

  <!-- quill across the lower medallion -->
  <g stroke="#5a0f0f" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" fill="#c62828">
    <path d="M150 372 L300 222 C330 192 360 210 350 240 C372 250 360 286 332 282 C346 300 320 326 300 300 L168 392 Z" opacity="0.92"/>
  </g>
  <path d="M150 372 L120 402 L138 418 L168 392 Z" fill="#e6c24f" stroke="#5a3a12" stroke-width="6"/>

  <!-- corner studs -->
  <g fill="#e9cf7e" stroke="#6a4a1a" stroke-width="3">
    <circle cx="56" cy="56" r="11"/><circle cx="456" cy="56" r="11"/>
    <circle cx="56" cy="456" r="11"/><circle cx="456" cy="456" r="11"/>
  </g>
</svg>
